<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 - 吴道贺的网站</title>
    <style>
        /* 全局样式与首页相同 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* 导航栏 */
        nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #667eea;
        }

        /* 主内容 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .content-card {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 600;
        }

        .contact-info {
            max-width: 600px;
            margin: 0 auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .contact-icon {
            font-size: 1.5rem;
            margin-right: 20px;
            color: #667eea;
            width: 40px;
            text-align: center;
        }

        .contact-text {
            font-size: 1.1rem;
            color: #555;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-links {
                gap: 15px;
            }
            
            .content-card {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="nav-container">
            <div class="logo">吴道贺的网站</div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="about.html">关于我</a>
                <a href="hobbies.html">我的爱好</a>
                <a href="contact.html" class="active">联系我</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container">
        <div class="content-card">
            <h1>联系我</h1>
            <div class="contact-info">
                <div class="contact-item">
                    <div class="contact-icon">📧</div>
                    <div class="contact-text">邮箱：example@example.com</div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon">💬</div>
                    <div class="contact-text">微信：your_wechat_id</div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon">🐙</div>
                    <div class="contact-text">GitHub：github.com/your_username</div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon">📍</div>
                    <div class="contact-text">所在地：中国</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
