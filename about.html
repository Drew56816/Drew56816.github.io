<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 - 吴道贺的网站</title>
    <style>
        /* 全局样式与首页相同 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* 导航栏 */
        nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #667eea;
        }

        /* 主内容 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .content-card {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 600;
        }

        .about-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .about-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 20px;
            color: #555;
        }

        .about-image {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 300px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.2rem;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-links {
                gap: 15px;
            }
            
            .content-card {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .about-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="nav-container">
            <div class="logo">吴道贺的网站</div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="about.html" class="active">关于我</a>
                <a href="hobbies.html">我的爱好</a>
                <a href="contact.html">联系我</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container">
        <div class="content-card">
            <h1>关于我</h1>
            <div class="about-section">
                <div class="about-text">
                    <p>大家好，我是吴道贺，一名正在学习编程的初学者。</p>
                    <p>我对计算机和互联网充满了好奇，最近开始学习HTML和CSS，这是我制作的第一个个人网站。</p>
                    <p>我相信通过不断学习和实践，我能够掌握更多的编程技能，创造出更多有趣的东西。</p>
                    <p>在这个网站上，我会分享我的学习经历、兴趣爱好和生活点滴。</p>
                </div>
                <div class="about-image">
                    这里可以放你的照片
                </div>
            </div>
        </div>
    </div>
</body>
</html>
